# Knowledge Nexus Framework™ - Kubernetes Services Deployment

# Data Nexus Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-nexus
  namespace: cmsknf
spec:
  replicas: 2
  selector:
    matchLabels:
      app: data-nexus
  template:
    metadata:
      labels:
        app: data-nexus
    spec:
      containers:
      - name: data-nexus
        image: cmsknf-data-nexus:latest
        ports:
        - containerPort: 8007
        env:
        - name: POSTGRES_HOST
          value: "postgres-service"
        - name: POSTGRES_DB
          valueFrom:
            configMapKeyRef:
              name: cmsknf-config
              key: POSTGRES_DB
        - name: POSTGRES_USER
          valueFrom:
            configMapKeyRef:
              name: cmsknf-config
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: cmsknf-secrets
              key: POSTGRES_PASSWORD
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: cmsknf-config
              key: REDIS_HOST
        - name: REDIS_PORT
          valueFrom:
            configMapKeyRef:
              name: cmsknf-config
              key: REDIS_PORT
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8007
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8007
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: data-nexus-service
  namespace: cmsknf
spec:
  selector:
    app: data-nexus
  ports:
  - port: 8007
    targetPort: 8007
  type: ClusterIP

