apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cmsknf-ingress
  namespace: cmsknf
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/use-regex: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
  - hosts:
    - cmsknf.yourdomain.com
    secretName: cmsknf-tls
  rules:
  - host: cmsknf.yourdomain.com
    http:
      paths:
      - path: /api/v1/data-nexus
        pathType: Prefix
        backend:
          service:
            name: data-nexus-service
            port:
              number: 8007
      - path: /api/v1/regulatory-intelligence
        pathType: Prefix
        backend:
          service:
            name: regulatory-intelligence-service
            port:
              number: 8006
      - path: /api/v1/insights-engine
        pathType: Prefix
        backend:
          service:
            name: insights-engine-service
            port:
              number: 8003
      - path: /api/v1/team-calibration
        pathType: Prefix
        backend:
          service:
            name: team-calibration-service
            port:
              number: 8002
      - path: /
        pathType: Prefix
        backend:
          service:
            name: data-nexus-service
            port:
              number: 8007
