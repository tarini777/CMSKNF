name: CMS Compliance Next.js CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'cms-compliance-nextjs/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'cms-compliance-nextjs/**'

defaults:
  run:
    working-directory: cms-compliance-nextjs

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cms-compliance-nextjs/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test -- --passWithNoTests

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: file:./dev.db
          AUTH_ENABLED: 'false'
