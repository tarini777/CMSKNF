name: Scheduled CMS Jobs

on:
  schedule:
    # Daily 06:00 UTC — aggregate recalc + FMV sync for pilot/production
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      programYear:
        description: Program year override (optional)
        required: false
        type: string

jobs:
  aggregate-and-fmv:
    runs-on: ubuntu-latest
    env:
      CRON_BASE_URL: ${{ vars.CRON_BASE_URL }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
      PROGRAM_YEAR: ${{ github.event.inputs.programYear || '' }}

    steps:
      # secrets.* cannot appear in job/step if: expressions — check in shell instead
      - name: Run aggregate recalculation and FMV sync
        run: |
          if [ -z "${CRON_SECRET}" ]; then
            echo "::warning::CRON_SECRET is not configured — skipping scheduled jobs."
            echo "Add CRON_SECRET in Settings → Secrets and variables → Actions."
            exit 0
          fi
          BASE_URL="${CRON_BASE_URL:-https://localhost:3000}"
          BODY='{"cronSecret":"'"$CRON_SECRET"'"}'
          if [ -n "$PROGRAM_YEAR" ]; then
            BODY=$(node -e "console.log(JSON.stringify({cronSecret:process.env.CRON_SECRET,programYear:process.env.PROGRAM_YEAR}))")
          fi
          curl -sf -X POST "$BASE_URL/api/jobs/aggregate" \
            -H "Content-Type: application/json" \
            -H "x-cron-secret: $CRON_SECRET" \
            -d "$BODY"
          curl -sf -X POST "$BASE_URL/api/connectors/fmv/sync" \
            -H "Content-Type: application/json" \
            -H "x-cron-secret: $CRON_SECRET" \
            -d '{"cronSecret":"'"$CRON_SECRET"'","sourceKey":"fmv_engine","rates":[]}'
