global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Assessment Service
  - job_name: 'assessment-service'
    static_configs:
      - targets: ['assessment-service:8001']
    metrics_path: '/metrics'
    scrape_interval: 30s

  # Team Calibration Service
  - job_name: 'team-calibration-service'
    static_configs:
      - targets: ['team-calibration-service:8002']
    metrics_path: '/metrics'
    scrape_interval: 30s

  # Insights Engine
  - job_name: 'insights-engine'
    static_configs:
      - targets: ['insights-engine:8003']
    metrics_path: '/metrics'
    scrape_interval: 30s

  # Innovation Platform
  - job_name: 'innovation-platform'
    static_configs:
      - targets: ['innovation-platform:8004']
    metrics_path: '/metrics'
    scrape_interval: 30s

  # Metrics Service
  - job_name: 'metrics-service'
    static_configs:
      - targets: ['metrics-service:8005']
    metrics_path: '/metrics'
    scrape_interval: 30s

  # Regulatory Intelligence
  - job_name: 'regulatory-intelligence'
    static_configs:
      - targets: ['regulatory-intelligence:8006']
    metrics_path: '/metrics'
    scrape_interval: 30s

  # Data Nexus
  - job_name: 'data-nexus'
    static_configs:
      - targets: ['cmsknf-data-nexus-1:8007']
    metrics_path: '/metrics'
    scrape_interval: 30s

  # CMS Metrics Server (Alternative)
  - job_name: 'cms-metrics'
    static_configs:
      - targets: ['host.docker.internal:8000']
    metrics_path: '/metrics'
    scrape_interval: 30s

  # PostgreSQL
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:5432']
    scrape_interval: 30s

  # Redis
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
    scrape_interval: 30s

  # Nginx
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx:80']
    metrics_path: '/nginx_status'
    scrape_interval: 30s
