<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Nexus Framework™ - Real-time Dashboard</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }
        
        .dashboard {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .metric-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
            text-align: center;
        }
        
        .metric-card:hover {
            transform: translateY(-5px);
        }
        
        .metric-value {
            font-size: 2.5rem;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .metric-label {
            color: #666;
            font-size: 1.1rem;
            margin-bottom: 5px;
        }
        
        .metric-change {
            font-size: 0.9rem;
            font-weight: 600;
        }
        
        .positive { color: #27ae60; }
        .negative { color: #e74c3c; }
        .neutral { color: #f39c12; }
        
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .chart-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        .chart-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #27ae60;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        
        .last-updated {
            text-align: center;
            color: white;
            opacity: 0.8;
            font-size: 0.9rem;
        }
        
        .loading {
            text-align: center;
            color: #667eea;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Metric Card Component
        function MetricCard({ label, value, change, changeType, icon }) {
            const changeClass = changeType === 'positive' ? 'positive' : 
                              changeType === 'negative' ? 'negative' : 'neutral';
            
            return (
                <div className="metric-card">
                    <div className="metric-value">{value}</div>
                    <div className="metric-label">{label}</div>
                    <div className={`metric-change ${changeClass}`}>
                        {change}
                    </div>
                </div>
            );
        }

        // Chart Component
        function ChartCard({ title, data, type = 'line' }) {
            const canvasRef = React.useRef(null);
            const chartRef = React.useRef(null);

            useEffect(() => {
                if (canvasRef.current && data) {
                    const ctx = canvasRef.current.getContext('2d');
                    
                    if (chartRef.current) {
                        chartRef.current.destroy();
                    }

                    chartRef.current = new Chart(ctx, {
                        type: type,
                        data: data,
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                legend: {
                                    display: false
                                }
                            },
                            scales: {
                                y: {
                                    beginAtZero: true,
                                    grid: {
                                        color: 'rgba(0,0,0,0.1)'
                                    }
                                },
                                x: {
                                    grid: {
                                        color: 'rgba(0,0,0,0.1)'
                                    }
                                }
                            }
                        }
                    });
                }
            }, [data, type]);

            return (
                <div className="chart-card">
                    <div className="chart-title">{title}</div>
                    <canvas ref={canvasRef} width="400" height="200"></canvas>
                </div>
            );
        }

        // Main Dashboard Component
        function Dashboard() {
            const [metrics, setMetrics] = useState(null);
            const [lastUpdated, setLastUpdated] = useState(null);
            const [loading, setLoading] = useState(true);

            const fetchMetrics = async () => {
                try {
                    const response = await fetch('http://localhost:8000/api/metrics');
                    const data = await response.json();
                    setMetrics(data);
                    setLastUpdated(new Date().toLocaleTimeString());
                    setLoading(false);
                } catch (error) {
                    console.error('Error fetching metrics:', error);
                    setLoading(false);
                }
            };

            useEffect(() => {
                fetchMetrics();
                const interval = setInterval(fetchMetrics, 5000); // Update every 5 seconds
                return () => clearInterval(interval);
            }, []);

            if (loading) {
                return (
                    <div className="dashboard">
                        <div className="header">
                            <h1>Knowledge Nexus Framework™</h1>
                            <p>Loading real-time metrics...</p>
                        </div>
                        <div className="loading">🔄 Fetching data...</div>
                    </div>
                );
            }

            if (!metrics) {
                return (
                    <div className="dashboard">
                        <div className="header">
                            <h1>Knowledge Nexus Framework™</h1>
                            <p>Error loading metrics</p>
                        </div>
                    </div>
                );
            }

            // Generate chart data
            const qualityTrendData = {
                labels: ['6h ago', '5h ago', '4h ago', '3h ago', '2h ago', '1h ago', 'Now'],
                datasets: [{
                    label: 'Data Quality Score',
                    data: [92.1, 92.8, 93.2, 92.9, 93.5, 92.4, metrics.cms_data_quality_score],
                    borderColor: '#667eea',
                    backgroundColor: 'rgba(102, 126, 234, 0.1)',
                    tension: 0.4,
                    fill: true
                }]
            };

            const processingData = {
                labels: ['6h ago', '5h ago', '4h ago', '3h ago', '2h ago', '1h ago', 'Now'],
                datasets: [{
                    label: 'Records Processed',
                    data: [145000, 146200, 147800, 146500, 148200, 147000, metrics.cms_records_processed_total],
                    borderColor: '#27ae60',
                    backgroundColor: 'rgba(39, 174, 96, 0.1)',
                    tension: 0.4,
                    fill: true
                }]
            };

            const complianceData = {
                labels: ['Data Quality', 'Compliance', 'Processing Rate', 'Error Rate'],
                datasets: [{
                    label: 'Performance Metrics',
                    data: [
                        metrics.cms_data_quality_score,
                        metrics.cms_compliance_score,
                        metrics.cms_processing_rate / 100, // Scale down for chart
                        metrics.cms_error_rate * 100 // Scale up for visibility
                    ],
                    backgroundColor: [
                        '#667eea',
                        '#27ae60',
                        '#f39c12',
                        '#e74c3c'
                    ]
                }]
            };

            return (
                <div className="dashboard">
                    <div className="header">
                        <h1>Knowledge Nexus Framework™</h1>
                        <p>
                            <span className="status-indicator"></span>
                            Real-time CMS Compliance Dashboard
                        </p>
                    </div>

                    <div className="metrics-grid">
                        <MetricCard
                            label="Data Quality Score"
                            value={`${metrics.cms_data_quality_score}%`}
                            change="+0.3% from last hour"
                            changeType="positive"
                        />
                        <MetricCard
                            label="Records Processed"
                            value={metrics.cms_records_processed_total.toLocaleString()}
                            change="+1,200 this hour"
                            changeType="positive"
                        />
                        <MetricCard
                            label="Duplicates Removed"
                            value={metrics.cms_duplicates_removed_total.toLocaleString()}
                            change="+45 today"
                            changeType="positive"
                        />
                        <MetricCard
                            label="Validation Errors"
                            value={metrics.cms_validation_errors_total}
                            change="-2 from yesterday"
                            changeType="positive"
                        />
                        <MetricCard
                            label="Compliance Score"
                            value={`${metrics.cms_compliance_score}%`}
                            change="+0.1% this week"
                            changeType="positive"
                        />
                        <MetricCard
                            label="Regulatory Rules"
                            value={metrics.cms_regulatory_rules_total}
                            change="+3 new rules"
                            changeType="neutral"
                        />
                    </div>

                    <div className="charts-grid">
                        <ChartCard
                            title="Data Quality Trends"
                            data={qualityTrendData}
                            type="line"
                        />
                        <ChartCard
                            title="Processing Volume"
                            data={processingData}
                            type="line"
                        />
                        <ChartCard
                            title="Performance Overview"
                            data={complianceData}
                            type="doughnut"
                        />
                    </div>

                    <div className="last-updated">
                        Last updated: {lastUpdated} | Auto-refresh every 5 seconds
                    </div>
                </div>
            );
        }

        // Render the dashboard
        ReactDOM.render(<Dashboard />, document.getElementById('root'));
    </script>
</body>
</html>
