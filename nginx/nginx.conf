events {
    worker_connections 1024;
}

http {
    upstream assessment_service {
        server cmsknf-assessment-service-1:8001;
    }
    
    upstream team_calibration_service {
        server cmsknf-team-calibration-service-1:8002;
    }
    
    upstream insights_engine {
        server cmsknf-insights-engine-1:8003;
    }
    
    upstream innovation_platform {
        server cmsknf-innovation-platform-1:8004;
    }
    
    upstream metrics_service {
        server cmsknf-metrics-service-1:8005;
    }
    
    upstream regulatory_intelligence {
        server cmsknf-regulatory-intelligence-1:8006;
    }
    
    upstream data_nexus {
        server cmsknf-data-nexus-1:8007;
    }
    
    upstream domain_engine {
        server cmsknf-domain-engine-1:8008;
    }
    
    upstream compliance_analytics {
        server cmsknf-compliance-analytics-1:8009;
    }
    
    upstream strategic_intelligence {
        server cmsknf-strategic-intelligence-1:8010;
    }
    
    upstream security_compliance {
        server cmsknf-security-compliance-1:8011;
    }

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    server {
        listen 80;
        server_name localhost;

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # Assessment Service
        location /api/v1/assessment/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://assessment_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Team Calibration Service
        location /api/v1/team-calibration/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://team_calibration_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Insights Engine
        location /api/v1/insights/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://insights_engine/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Innovation Platform
        location /api/v1/innovation/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://innovation_platform/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Metrics Service
        location /api/v1/metrics/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://metrics_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Regulatory Intelligence
        location /api/v1/regulatory/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://regulatory_intelligence/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Data Nexus
        location /api/v1/data-nexus/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://data_nexus/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Domain Expertise Engine
        location /api/v1/domain-engine/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://domain_engine/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Compliance Analytics
        location /api/v1/compliance-analytics/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://compliance_analytics/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Strategic Intelligence
        location /api/v1/strategic-intelligence/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://strategic_intelligence/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Security & Compliance
        location /api/v1/security-compliance/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://security_compliance/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Serve dashboard
        location / {
            root /usr/share/nginx/html;
            index dashboard-react.html;
            try_files $uri $uri/ /dashboard-react.html;
        }
        
        # Serve original dashboard
        location /dashboard {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /dashboard.html;
        }
        
        # Serve React dashboard
        location /react {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /dashboard-react.html;
        }
        
        location /dashboard {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /dashboard.html;
        }
        
        # Serve static files
        location ~* \.(html|css|js|png|jpg|jpeg|gif|ico|svg)$ {
            root /usr/share/nginx/html;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
