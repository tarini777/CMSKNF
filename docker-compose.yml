services:
  # PostgreSQL Database
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: cms_compliance
      POSTGRES_USER: cms_user
      POSTGRES_PASSWORD: cms_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cms_user -d cms_compliance"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis Cache
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Assessment Service
  assessment-service:
    build:
      context: .
      dockerfile: services/assessment-service/Dockerfile
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=postgresql://cms_user:cms_password@postgres:5432/cms_compliance
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/assessment-service:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Team Calibration Service
  team-calibration-service:
    build:
      context: .
      dockerfile: services/team-calibration/Dockerfile
    ports:
      - "8002:8002"
    environment:
      - DATABASE_URL=postgresql://cms_user:cms_password@postgres:5432/cms_compliance
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/team-calibration:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Insights Engine
  insights-engine:
    build:
      context: .
      dockerfile: services/insights-engine/Dockerfile
    ports:
      - "8003:8003"
    environment:
      - DATABASE_URL=postgresql://cms_user:cms_password@postgres:5432/cms_compliance
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/insights-engine:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Innovation Platform
  innovation-platform:
    build:
      context: .
      dockerfile: services/innovation-platform/Dockerfile
    ports:
      - "8004:8004"
    environment:
      - DATABASE_URL=postgresql://cms_user:cms_password@postgres:5432/cms_compliance
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/innovation-platform:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Metrics Service
  metrics-service:
    build:
      context: .
      dockerfile: services/metrics-service/Dockerfile
    ports:
      - "8005:8005"
    environment:
      - DATABASE_URL=postgresql://cms_user:cms_password@postgres:5432/cms_compliance
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/metrics-service:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8005/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Regulatory Intelligence Service
  regulatory-intelligence:
    build:
      context: .
      dockerfile: services/regulatory-intelligence/Dockerfile
    ports:
      - "8006:8006"
    environment:
      - DATABASE_URL=postgresql://cms_user:cms_password@postgres:5432/cms_compliance
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/regulatory-intelligence:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8006/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Data Nexus Integration Hub
  data-nexus:
    build:
      context: .
      dockerfile: services/data-nexus/Dockerfile
    ports:
      - "8007:8007"
    environment:
      - DATABASE_URL=postgresql://cms_user:cms_password@postgres:5432/cms_compliance
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/data-nexus:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8007/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Domain Expertise Engine
  domain-engine:
    build:
      context: .
      dockerfile: services/domain-engine/Dockerfile
    ports:
      - "8008:8008"
    environment:
      - DATABASE_URL=postgresql://cms_user:cms_password@postgres:5432/cms_compliance
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/domain-engine:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8008/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Compliance Analytics & Insights
  compliance-analytics:
    build:
      context: .
      dockerfile: services/compliance-analytics/Dockerfile
    ports:
      - "8009:8009"
    environment:
      - DATABASE_URL=postgresql://cms_user:cms_password@postgres:5432/cms_compliance
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/compliance-analytics:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8009/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Strategic Intelligence Platform
  strategic-intelligence:
    build:
      context: .
      dockerfile: services/strategic-intelligence/Dockerfile
    ports:
      - "8010:8010"
    environment:
      - DATABASE_URL=postgresql://cms_user:cms_password@postgres:5432/cms_compliance
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/strategic-intelligence:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Security & Compliance Framework
  security-compliance:
    build:
      context: .
      dockerfile: services/security-compliance/Dockerfile
    ports:
      - "8011:8011"
    environment:
      - DATABASE_URL=postgresql://cms_user:cms_password@postgres:5432/cms_compliance
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/security-compliance:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8011/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx Load Balancer
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
      - ./web:/usr/share/nginx/html
    depends_on:
      - assessment-service
      - team-calibration-service
      - insights-engine
      - innovation-platform
      - metrics-service
      - regulatory-intelligence
      - data-nexus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'

  # Grafana Dashboard
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus

  # Next.js CMS Compliance Platform (Phase 2)
  cms-nextjs:
    build:
      context: ./cms-compliance-nextjs
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    environment:
      - DATABASE_URL=file:/app/prisma/dev.db
      - AUTH_ENABLED=true
      - JWT_SECRET=docker-jwt-secret-change-me
      - NODE_ENV=production
    volumes:
      - nextjs_data:/app/prisma
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  nextjs_data:

networks:
  default:
    name: cms-compliance-network
